# SparkUpCloud API - Nginx config for api.sparkupcloud.com
# This file gets placed at /etc/nginx/conf.d/certprep.conf
# SSL is added automatically by certbot --nginx

server {
    listen 80;
    server_name api.sparkupcloud.com;

    # Redirect HTTP to HTTPS (certbot adds this automatically)
    # location / { return 301 https://$host$request_uri; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for study sessions
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (no proxy overhead)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
