<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Cloud body -->
  <path d="M40 120 C40 120 25 120 20 108 C15 96 22 86 32 84 C30 74 36 64 48 62 C52 50 64 42 80 42 C96 42 108 50 112 62 C124 64 130 74 128 84 C138 86 145 96 140 108 C135 120 120 120 120 120 Z"
        fill="#f5f5f4" stroke="#d6d3d1" stroke-width="2"/>

  <!-- Cloud highlight (front layer) -->
  <path d="M50 120 C50 120 38 120 34 110 C30 100 36 92 44 90 C42 82 48 74 58 72 C62 62 72 56 85 56 C98 56 108 62 112 72 C122 74 128 82 126 90 C134 92 140 100 136 110 C132 120 120 120 120 120 Z"
        fill="white" stroke="#e7e5e4" stroke-width="1.5"/>

  <!-- Star 1 (left) - small -->
  <path d="M58 38 L60.5 30 L63 38 L71 40.5 L63 43 L60.5 51 L58 43 L50 40.5 Z"
        fill="#f59e0b" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Star 2 (center) - large, brightest -->
  <path d="M96 18 L100 6 L104 18 L116 22 L104 26 L100 38 L96 26 L84 22 Z"
        fill="#f59e0b">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Star 3 (right) - medium -->
  <path d="M132 32 L135 22 L138 32 L148 35 L138 38 L135 48 L132 38 L122 35 Z"
        fill="#f59e0b" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- Spark trails rising from cloud -->
  <line x1="60" y1="55" x2="58" y2="45" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="48" x2="100" y2="35" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="135" y1="52" x2="137" y2="42" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/>
  </line>

  <!-- Brand text -->
  <text x="80" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16">
    <tspan fill="#1c1917">SparkUp</tspan><tspan fill="#f59e0b">Cloud</tspan>
  </text>
</svg>
